services:
  command-center:
    build: .
    container_name: siyada-command-center
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://journals_user:${DB_PASSWORD}@db:5432/journals
      - PAPERCLIP_API_URL=${PAPERCLIP_API_URL}
      - PAPERCLIP_API_KEY=${PAPERCLIP_API_KEY}
      - PAPERCLIP_COMPANY_ID=${PAPERCLIP_COMPANY_ID}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=3200
    ports:
      - "3200:3200"
    # Allows using host.docker.internal to reach the VPS host from inside the container.
    # Useful if PAPERCLIP_API_URL needs to reach a service running directly on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    external: true
    name: siyada-orchestrator_default
