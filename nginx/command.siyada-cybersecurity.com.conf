server {
    listen 80;
    server_name command.siyada-cybersecurity.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name command.siyada-cybersecurity.com;

    # Wildcard cert for *.siyada-cybersecurity.com
    ssl_certificate     /etc/letsencrypt/live/siyada-cybersecurity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siyada-cybersecurity.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
